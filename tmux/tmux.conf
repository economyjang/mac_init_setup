# Prefix: C-b → C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse
set -g mouse on

# Vi 모드
setw -g mode-keys vi

# 스크롤백 히스토리
set -g history-limit 100000

# 설정 리로드
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded!"

# 인덱스 1부터 시작
set -g base-index 1
setw -g pane-base-index 1

# ESC 지연 제거
set -sg escape-time 0

# 상태바
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#24292f,fg=#c9d1d9"

# 상태바 좌측: 세션명
set -g status-left-length 30
set -g status-left "#[fg=#58a6ff,bold] #S "

# 상태바 우측: 날짜/시간
set -g status-right-length 50
set -g status-right "#[fg=#8b949e]%Y-%m-%d #[fg=#58a6ff]%H:%M "

# 윈도우 탭
setw -g window-status-format " #I:#W "
setw -g window-status-style "fg=#8b949e"
setw -g window-status-current-format " #[fg=#ffffff,bg=#2f81f7,bold]#I:#W "
setw -g window-status-current-style "fg=#ffffff,bg=#2f81f7"

# Pane 테두리
set -g pane-border-style "fg=#30363d"
set -g pane-active-border-style "fg=#58a6ff"

# 메시지 / 시계
set -g message-style "bg=#2d333b,fg=#c9d1d9"
set -g clock-mode-colour "#58a6ff"

# Pane 분할: | 좌우, - 상하
unbind %
unbind '"'
bind | split-window -h
bind - split-window -v

# Pane 이동 (Vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane 크기 조절 (Vim)
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Pane 최대화 / 종료
bind z resize-pane -Z
bind x kill-pane

# 윈도우 순서 이동: < 왼쪽, > 오른쪽
bind < swap-window -t -1 \; previous-window
bind > swap-window -t +1 \; next-window

# 클립보드: tmux가 직접 소유, macOS pbcopy 사용
set -s set-clipboard on
set -s copy-command "pbcopy"

# 마우스 드래그/더블/트리플 클릭 선택 시 pbcopy 복사 후 종료
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi DoubleClick1Pane select-word \; send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi TripleClick1Pane select-line \; send -X copy-pipe-and-cancel "pbcopy"

# Claude Code: 이스케이프 시퀀스 통과 + 확장 키 + 포커스 이벤트
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g focus-events on
