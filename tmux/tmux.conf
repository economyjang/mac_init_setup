##### Prefix #####
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### Mouse #####
set -g mouse on

##### Vi Mode #####
setw -g mode-keys vi

##### History #####
set -g history-limit 100000

##### Reload Config #####
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded!"

##### Window / Pane Index #####
set -g base-index 1
setw -g pane-base-index 1

##### Faster Escape #####
set -sg escape-time 0

##### Status Bar #####
set -g status on
set -g status-position bottom
set -g status-interval 5

##### GitHub Dark Colors #####
set -g status-style "bg=#24292f,fg=#c9d1d9"

##### Left #####
set -g status-left-length 30
set -g status-left "#[fg=#58a6ff,bold] #S "

##### Right #####
set -g status-right-length 50
set -g status-right "#[fg=#8b949e]%Y-%m-%d #[fg=#58a6ff]%H:%M "

##### Window Style #####
setw -g window-status-format " #I:#W "
setw -g window-status-style "fg=#8b949e"

##### Active Window #####
setw -g window-status-current-format " #[fg=#ffffff,bg=#2f81f7,bold]#I:#W "
setw -g window-status-current-style "fg=#ffffff,bg=#2f81f7"

##### Pane Border #####
set -g pane-border-style "fg=#30363d"
set -g pane-active-border-style "fg=#58a6ff"

##### Messages #####
set -g message-style "bg=#2d333b,fg=#c9d1d9"

##### Clock #####
set -g clock-mode-colour "#58a6ff"

##### Pane Split #####
unbind %
unbind '"'

# Vertical Split (좌우)
bind | split-window -h

# Horizontal Split (상하)
bind - split-window -v

##### Pane Navigation (Vim Style) #####
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Pane Resize (Vim Style) #####
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

##### Pane #####
# 현재 Pane 최대화 / 복원
bind z resize-pane -Z

# 현재 Pane 종료
bind x kill-pane

##### Clipboard #####
# 마우스 사용
set -g mouse on

# 시스템 클립보드 연동 (tmux가 직접 클립보드 소유)
set -s set-clipboard on

# macOS 클립보드
set -s copy-command "pbcopy"

# 마우스 드래그로 선택 → pbcopy 복사 후 copy-mode 종료
# (vi mode 기본은 시스템 클립보드로 복사 안 하므로 명시 바인딩)
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
# 더블클릭 = 단어 선택 후 복사
bind -T copy-mode-vi DoubleClick1Pane select-word \; send -X copy-pipe-and-cancel "pbcopy"
# 트리플클릭 = 줄 선택 후 복사
bind -T copy-mode-vi TripleClick1Pane select-line \; send -X copy-pipe-and-cancel "pbcopy"

##### Claude Code #####
# Claude Code 등 앱이 이스케이프 시퀀스를 그대로 통과시키도록 허용
set -g allow-passthrough on

# 확장 키(Shift+Enter 등) 인식 활성화
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
